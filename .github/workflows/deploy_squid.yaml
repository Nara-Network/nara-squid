name: Deploy Squid

# Controls when the action will run
on:
  # Allows the workflow to be triggered manually from the GitHub Actions tab
  workflow_dispatch:
    inputs:
      branch:
        type: string
        description: Branch to checkout and deploy
        required: false
        default: main
      version:
        type: string
        description: Squid version to deploy (-s flag)
        required: true

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  deploy:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          ref: ${{ github.event.inputs.branch }}

      # Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '18.x'
          scope: '@protocol-squid'

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # Build the Squid project
      - name: Build Squid project
        run: npm run build

      # Install Squid CLI
      - name: Install Squid CLI
        run: npm install @subsquid/cli

      # Configure CLI with Squid Auth Token (store the token as `SQUID_AUTH_TOKEN` in GitHub secrets)
      - name: Configure CLI using Squid Auth token
        run: npx sqd auth -k ${{ secrets.SQUID_AUTH_TOKEN }}

      # Deploy Squid
      - name: Deploy Squid
        run: npx sqd deploy . -o holdex -n nara-squid -s ${{ github.event.inputs.version }} --allow-manifest-override --no-interactive --allow-update
