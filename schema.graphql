type ExpectedExchangeRate @entity {
  id: ID! @index
  vault: PortVault! @index
  expectedLastAccrualTs: Int!
  expectedLastUpdateTs: Int!
  expectedAssetsBaseRaw: BigInt!
  # Total borrower liability: principal + accruedBorrowInterest + accruedCommitmentFee
  # This is the "borrowed" component in netAssets = idle + invested + borrowed
  expectedBorrowedBaseRaw: BigInt!
  # Borrower principal outstanding (excludes accrued interest and fees)
  expectedBorrowedPrincipalBaseRaw: BigInt!
  expectedExchangeRateBaseRaw: BigInt!
  commitmentFeeAccruedMtdBaseRaw: BigInt!
  commitmentFeeProjectedMonthEndBaseRaw: BigInt!
  commitmentFeeMtdMonthStartTs: Int!
  borrowInterestAccruedMtdBaseRaw: BigInt!
  borrowInterestProjectedMonthEndBaseRaw: BigInt!
  borrowInterestMtdMonthStartTs: Int!
  expectedRepaymentPendingBaseRaw: BigInt!
  expectedRepaymentCreditBaseRaw: BigInt!
  borrowRateBps: BigInt!
  commitmentFeeRateBps: BigInt!
  # Shares are event-tracked; do not read totalSupply from contract.
  # Updated ONLY via Enter (increase) and AtomicRequestFulfilled/withdrawal (decrease) events.
  totalSharesTracked: BigInt!
  totalSharesSource: String!
  # Net assets tracked from external events (Enter deposits, AtomicRequestFulfilled withdrawals).
  # This is the source of truth for EER calculation. Accrual deltas are applied at update intervals.
  # Component-based recompute is for diagnostics only, never overwrites this.
  netAssetsTrackedBaseRaw: BigInt!
  # Simplified EER tracking fields (for time window based calculation mode)
  idleBaseTracked: BigInt!
  investedBaseTracked: BigInt!
  accruedCommitmentFeeBase: BigInt!
  accruedBorrowInterestBase: BigInt!
  lastAccrualBlock: BigInt!
  # Strategy yield persisted across updates to prevent yield loss on effectiveStrategyValueBase reload
  strategyYieldBase: BigInt!
  lastSnapshotTsUsed: Int!
  # Remainder accumulation to prevent BigInt truncation drift with small amounts / short time windows
  commitFeeRemainderNumerator: BigInt!
  borrowInterestRemainderNumerator: BigInt!
}

# EER Snapshot - captures state on each EER calculation
# Includes ALL fields needed to reproduce Excel calculation in isolation (no hidden state)
type ExpectedExchangeRateSnapshot @entity {
  id: ID! @index
  vault: PortVault! @index
  network: Network! @index
  vaultAddress: String! @index
  blockHeight: BigInt! @index
  blockTimestampMs: BigInt!
  nowSec: Int!
  updateTs: Int! @index
  
  # Block/time aliases (for Excel reproduction)
  block: BigInt! # alias of blockHeight
  blockTimestamp: Int! # alias of nowSec (seconds)
  
  # ExpectedExchangeRate fields (matching current structure)
  expectedLastAccrualTs: Int!
  expectedLastUpdateTs: Int!
  expectedAssetsBaseRaw: BigInt!
  expectedBorrowedBaseRaw: BigInt!
  expectedBorrowedPrincipalBaseRaw: BigInt!
  expectedExchangeRateBaseRaw: BigInt!
  commitmentFeeAccruedMtdBaseRaw: BigInt!
  commitmentFeeProjectedMonthEndBaseRaw: BigInt!
  commitmentFeeMtdMonthStartTs: Int!
  borrowInterestAccruedMtdBaseRaw: BigInt!
  borrowInterestProjectedMonthEndBaseRaw: BigInt!
  borrowInterestMtdMonthStartTs: Int!
  expectedRepaymentPendingBaseRaw: BigInt!
  expectedRepaymentCreditBaseRaw: BigInt!
  borrowRateBps: BigInt!
  commitmentFeeRateBps: BigInt!
  totalSharesTracked: BigInt!
  totalSharesSource: String!
  netAssetsTrackedBaseRaw: BigInt!
  idleBaseTracked: BigInt!
  investedBaseTracked: BigInt!
  accruedCommitmentFeeBase: BigInt!
  accruedBorrowInterestBase: BigInt!
  lastAccrualBlock: BigInt!
  utilizationBps: BigInt!
  
  # Bases (explicitly named for Excel reproduction)
  # Note: Some fields duplicate existing ones for clarity (idleBase vs idleBaseTracked, etc.)
  idleBase: BigInt!
  investedBase: BigInt! # principal invested (alias of investedBaseTracked for clarity)
  effectiveStrategyValueBase: BigInt! # current diverted value (principal + returns)
  borrowedPrincipalBase: BigInt!
  # accruedBorrowInterestBase and accruedCommitmentFeeBase already exist above, not duplicating
  
  # Derived (for Excel reproduction)
  borrowedForTier: BigInt! # principal + interest (NO commitment fee) - used for tier selection
  borrowedReported: BigInt! # principal + interest + commitment fee - used for NAV/EER
  utilForTierBps: BigInt! # utilization for tier selection (based on borrowedForTier)
  utilReportedBps: BigInt! # utilization for reporting (based on borrowedReported)
  netAssetsBase: BigInt! # net assets = idle + effectiveStrategyValue + borrowedReported
  eer: BigInt! # expected exchange rate = netAssetsBase / totalSharesTracked
  
  # Debugging fields (for Excel comparison and regression testing)
  totalAssetsBase: BigInt! # idle + invested + borrowedPrincipal (for debugging utilization calculation)
  dtSeconds: Int! # time delta in seconds for the final accrual segment (lastAccrualTs -> cutoffTs)
  commitmentFeeAccruedDeltaBase: BigInt! # commitment fee accrued in this update window
  borrowInterestAccruedDeltaBase: BigInt! # borrow interest accrued in this update window
  
  # Tier freezing fields (critical for path-independence)
  utilForTierBpsStart: BigInt! # utilization at START of window (used for tier selection) - FROZEN for entire window
  commitFeeRateBpsStart: BigInt! # tier frozen at START of window (used for entire window) - prevents path-dependent behavior
  
  # Batch metadata fields (for debugging convergence)
  batchFirstBlock: BigInt!
  batchLastBlock: BigInt!
  batchCount: Int!
  hourTs: Int! # hour boundary timestamp (floorToHour(cutoffTs))
  lastAccrualTsBefore: Int! # lastAccrualTs before update
  lastAccrualTsAfter: Int! # lastAccrualTs after update
  utilBpsEnd: BigInt! # utilization at end (alias of utilReportedBps for clarity)
}

