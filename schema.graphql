enum Network {
  ARBITRUM
  ARBITRUM_SEPOLIA
}

enum PoolStatus {
  Open
  Active
  Overdue
  Warning
  ProvisionalDefault
  Default
  Closed
}

type Token @entity {
  id: ID! @index
  address: String! @index # asset address
  network: Network! @index
  name: String!
  symbol: String! @index
  decimals: BigInt!
  price: BigDecimal!
  isPoolToken: Boolean!
  coinGeckoId: String
  tvlMultiplier: Int!
}

type RewardToken @entity {
  id: ID! @index
  token: Token!
  ozean: Ozean @index
  rate: BigInt!
}

enum OperationType {
  #common
  Repaid
  Deposited
  Withdrawal
  PoolClosed

  # virtual
  TransferIn # cpTokens
  TransferOut # cpTokens
  InterestAccrued # together with repayment
  PenaltyInterestAccrued # together with repayment
  InterestEarned
  PenaltyInterestEarned

  # staking
  Staked
  Unstaked
  YieldDistributed
}

enum OperationMedium {
  ON_CHAIN
  VIRTUAL
  OFF_CHAIN
}

enum OperationPersona {
  POOL
  LENDER
  BORROWER
}

type Operation @entity {
  id: ID! @index
  hash: String
  ozean: Ozean @index
  type: OperationType!
  currency: Token!
  medium: OperationMedium!
  persona: [OperationPersona!]!
  amount: BigInt
  createdAt: BigInt!
  snapshot: OperationSnapshot
  account: String! @index
}

type OperationSnapshot {
  apr: BigInt!
  exchangeRate: BigInt!
  # account balance, if is virtual event balance is in cpTokens
  balance: BigInt!
}

type Stake @entity {
  id: ID! @index
