enum Network {
  ETHEREUM
  ETHEREUM_SEPOLIA
  BSC
}

type Token @entity {
  id: ID! @index
  address: String! @index
  network: Network! @index
  name: String!
  symbol: String! @index
  decimals: BigInt!
  price: BigDecimal!
  isPoolToken: Boolean!
  coinGeckoId: String
  tvlMultiplier: Int!
}

type User @entity {
  id: ID! @index
  address: String! @index
  isTestnet: Boolean!
  portWithdrawalRequests: [PortWithdrawalRequest!]! @derivedFrom(field: "user")
  portDeposits: [PortDeposit!]! @derivedFrom(field: "user")
  naraRedemptions: [NaraRedemption!]! @derivedFrom(field: "user")
}

type NaraGlobalStats @entity {
  id: ID! @index
  network: Network! @index
  naraUsdSupply: BigInt!
  naraUsdSupplyFormatted: BigDecimal!
  naraUsdDecimals: Int!
  # Latest NaraUSD+ vestingAmount() read at the head block. Denominated in the
  # underlying asset (NaraUSD, 18 decimals). Zero on networks without a verified
  # NaraUSD+ yield interface (e.g. BSC). Feeds the protocol APR shown in the app.
  naraUsdPlusVestingAmount: BigInt!
  # Reward-timing inputs for the app APR annualizer (both seconds). Zero on
  # networks without a NaraUSD+ yield interface (e.g. BSC).
  naraUsdPlusLastDistributionAt: BigInt!
  naraUsdPlusVestingPeriod: BigInt!
  reserveFundFormatted: BigDecimal!
  protocolBackingRatio: BigDecimal!
  percentageStaked: BigDecimal!
  investmentAssetsFormatted: BigDecimal!
  cashAndEquivalentsFormatted: BigDecimal!
  totalAssetsFormatted: BigDecimal!
  apy7d: BigInt!
  apy14d: BigInt!
  apy30d: BigInt!
  weightedApy7d: BigInt!
  weightedTenorDays: Int
  updatedAt: BigInt!
}

type NaraSupplyChartPoint @entity {
  id: ID! @index
  network: Network! @index
  timestamp: BigInt! @index
  block: BigInt!
  naraUsdSupply: BigInt!
  naraUsdSupplyFormatted: BigDecimal!
  # NaraUSD locked inside NaraUSD+ (the vault's totalAssets() reading at this
  # snapshot). Optional because (a) historical points predating this column are
  # null until backfilled, and (b) networks without yield metrics (e.g. BSC)
  # don't have a NaraUSD+ deployment.
  naraUsdPlusTotalAssets: BigInt
  naraUsdPlusTotalAssetsFormatted: BigDecimal
}

type NaraTvlChartPoint @entity {
  id: ID! @index
  network: Network! @index
  chain: String! @index
  timestamp: BigInt! @index
  block: BigInt!
  tvlUsd: BigInt!
}

type NaraApyChartPoint @entity {
  id: ID! @index
  network: Network! @index
  timestamp: BigInt! @index
  block: BigInt!
  updatedAt: BigInt!
  exchangeRate: BigInt!
  apr: BigInt!
  apy7d: BigInt!
  apy14d: BigInt!
  apy30d: BigInt!
}

enum NaraRedemptionAction {
  INSTANT_REDEEM
  REQUESTED
  COMPLETED
}

enum NaraRedemptionStatus {
  REQUESTED
  COMPLETED
}

type NaraRedemption @entity {
  id: ID! @index
  user: User! @index
  status: NaraRedemptionStatus! @index
  naraUsdAmount: BigInt!
  collateralAmount: BigInt
  collateralAssetAddress: String! @index
  requestedAt: BigInt!
  completedAt: BigInt
  updatedAt: BigInt!
  activities: [NaraRedemptionActivity!]! @derivedFrom(field: "redemption")
}

type NaraRedemptionActivity @entity {
  id: ID! @index
  redemption: NaraRedemption! @index
  action: NaraRedemptionAction! @index
  naraUsdAmount: BigInt!
